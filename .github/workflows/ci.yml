name: SmartMealServices CI

on:
  pull_request:
    branches: ["master"]
  push:
    branches: ["master"]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore
      run: dotnet restore ./SmartMealSevice.slnx

    - name: Build
      run: dotnet build ./SmartMealSevice.slnx --configuration Release --no-restore

    - name: Run Tests
      run: dotnet test ./SmartMealSevice.slnx --configuration Release --no-build --verbosity normal


  
